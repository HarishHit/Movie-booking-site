<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | CineBook</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    body { display: flex; min-height: 100vh; }

    .auth-left {
      flex: 1;
      background: var(--accent);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px 40px;
      position: relative;
      overflow: hidden;
    }

    .auth-left::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .brand span { color: #e8765e; }

    .auth-left-tagline {
      color: rgba(255,255,255,0.55);
      font-size: 15px;
      margin-top: 12px;
      text-align: center;
    }

    .auth-right {
      width: 520px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 48px;
      background: var(--bg);
    }

    .auth-form-wrap { width: 100%; max-width: 380px; }

    .auth-title {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .auth-subtitle {
      color: var(--text2);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--text2);
    }
    .auth-footer a { color: var(--text); font-weight: 500; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }

    .password-hint {
      font-size: 12px;
      color: var(--text3);
      margin-top: -12px;
      margin-bottom: 16px;
    }

    @media (max-width: 768px) {
      .auth-left { display: none; }
      .auth-right { width: 100%; padding: 40px 24px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="auth-left">
    <div style="text-align:center; position:relative; z-index:1;">
      <div class="brand">Cine<span>Book</span></div>
      <p class="auth-left-tagline">Join thousands of movie lovers<br>booking tickets every day.</p>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-form-wrap">
      <h1 class="auth-title">Create account</h1>
      <p class="auth-subtitle">Free to join. Start booking in minutes.</p>

      <div id="alertBox"></div>

      <form id="registerForm">
        <div class="form-row">
          <div class="form-group">
            <label>First name</label>
            <input type="text" id="firstName" placeholder="Arjun" required>
          </div>
          <div class="form-group">
            <label>Last name</label>
            <input type="text" id="lastName" placeholder="Kumar" required>
          </div>
        </div>

        <div class="form-group">
          <label>Email address</label>
          <input type="email" id="email" placeholder="arjun@example.com" required>
        </div>

        <div class="form-group">
          <label>Phone number</label>
          <input type="tel" id="phone" placeholder="+91 98765 43210">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Min. 6 characters" required>
        </div>
        <p class="password-hint">Must be at least 6 characters long.</p>

        <div class="form-group">
          <label>Confirm password</label>
          <input type="password" id="confirmPassword" placeholder="Repeat password" required>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg">Create Account</button>
      </form>

      <hr class="divider">

      <p class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </p>
    </div>
  </div>

  <script>
    const form = document.getElementById('registerForm');
    const alertBox = document.getElementById('alertBox');

    function showAlert(msg, type) {
      alertBox.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (!firstName || !lastName || !email || !password || !confirm) {
        showAlert('Please fill in all required fields.', 'error'); return;
      }
      if (password.length < 6) {
        showAlert('Password must be at least 6 characters.', 'error'); return;
      }
      if (password !== confirm) {
        showAlert('Passwords do not match.', 'error'); return;
      }

      const users = JSON.parse(localStorage.getItem('cb_users') || '[]');
      if (users.find(u => u.email === email)) {
        showAlert('An account with this email already exists.', 'error'); return;
      }

      users.push({ name: firstName + ' ' + lastName, email, phone, password });
      localStorage.setItem('cb_users', JSON.stringify(users));

      showAlert('Account created! Redirecting to login...', 'success');
      setTimeout(() => window.location.href = 'login.html', 1500);
    });
  </script>
</body>
</html>
