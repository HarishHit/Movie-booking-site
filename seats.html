<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Seats | CineBook</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .booking-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* Screen */
    .screen-wrap {
      text-align: center;
      margin-bottom: 32px;
    }
    .screen {
      display: inline-block;
      width: 70%;
      padding: 8px 0;
      background: linear-gradient(180deg, #e8e6e0 0%, #d4d1ca 100%);
      border-radius: 0 0 50% 50% / 0 0 20px 20px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .screen-label { font-size: 12px; color: var(--text3); }

    /* Seat grid */
    .seat-section { margin-bottom: 28px; }
    .seat-section-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .seat-section-price {
      font-size: 11px;
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 10px;
      color: var(--text3);
      font-weight: 400;
      letter-spacing: 0;
    }

    .seat-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }

    .row-label {
      width: 18px;
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      flex-shrink: 0;
    }

    .seat {
      width: 30px; height: 30px;
      border-radius: 6px 6px 4px 4px;
      border: 1.5px solid var(--border2);
      background: var(--surface);
      cursor: pointer;
      font-size: 10px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text3);
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .seat:hover:not(.booked) { border-color: var(--accent); background: var(--surface2); }
    .seat.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
    .seat.booked { background: var(--surface2); border-color: var(--border); color: var(--border2); cursor: not-allowed; }
    .seat.premium { border-color: #c8a45a; }
    .seat.premium.selected { background: #c8a45a; border-color: #c8a45a; }

    .aisle { width: 16px; flex-shrink: 0; }

    /* Legend */
    .legend {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text2);
    }
    .legend-seat {
      width: 20px; height: 20px;
      border-radius: 4px 4px 3px 3px;
      border: 1.5px solid;
    }
    .legend-seat.available { border-color: var(--border2); background: var(--surface); }
    .legend-seat.selected { border-color: var(--accent); background: var(--accent); }
    .legend-seat.booked { border-color: var(--border); background: var(--surface2); }
    .legend-seat.premium { border-color: #c8a45a; background: var(--surface); }

    /* Summary panel */
    .summary-panel {
      position: sticky;
      top: 80px;
      align-self: start;
    }

    .summary-movie {
      display: flex;
      gap: 14px;
      align-items: center;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .summary-movie-icon {
      width: 50px; height: 50px;
      border-radius: var(--radius-sm);
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }
    .summary-movie-title { font-weight: 600; font-size: 15px; }
    .summary-movie-meta { font-size: 13px; color: var(--text2); }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .summary-row-label { color: var(--text2); }
    .summary-row-val { font-weight: 500; text-align: right; max-width: 60%; }

    .summary-total {
      border-top: 1px solid var(--border);
      padding-top: 14px;
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .summary-total-label { font-weight: 600; font-size: 15px; }
    .summary-total-price { font-size: 22px; font-weight: 600; color: var(--red); }

    .no-seat-msg { font-size: 13px; color: var(--text3); font-style: italic; }

    @media (max-width: 900px) {
      .booking-layout { grid-template-columns: 1fr; }
      .summary-panel { position: static; }
      .seat { width: 26px; height: 26px; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="home.html" class="logo">Cine<span style="color:var(--red)">Book</span></a>
    <ul class="nav-links">
      <li><a href="home.html">Home</a></li>
      <li><a href="movies.html">Movies</a></li>
      <li><a href="login.html" id="logoutBtn">Logout</a></li>
    </ul>
  </nav>

  <div style="background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;">
    <div class="steps">
      <div class="step done"><span class="step-num">✓</span> Movie</div>
      <span class="sep">›</span>
      <div class="step done"><span class="step-num">✓</span> Showtime</div>
      <span class="sep">›</span>
      <div class="step active"><span class="step-num">3</span> Seats</div>
      <span class="sep">›</span>
      <div class="step"><span class="step-num">4</span> Payment</div>
      <span class="sep">›</span>
      <div class="step"><span class="step-num">5</span> Ticket</div>
    </div>
  </div>

  <div class="booking-layout">
    <!-- Seat Map -->
    <div>
      <h2 class="section-title" id="screenName">Screen 1</h2>
      <p style="font-size:14px;color:var(--text2);margin-bottom:24px;" id="showInfo">—</p>

      <div class="screen-wrap">
        <div class="screen">SCREEN</div>
        <div class="screen-label">All eyes this way</div>
      </div>

      <div class="legend">
        <div class="legend-item"><div class="legend-seat available"></div> Available</div>
        <div class="legend-item"><div class="legend-seat selected"></div> Selected</div>
        <div class="legend-item"><div class="legend-seat booked"></div> Taken</div>
        <div class="legend-item"><div class="legend-seat premium"></div> Premium</div>
      </div>

      <div id="seatMap"></div>
    </div>

    <!-- Summary Panel -->
    <div class="summary-panel">
      <div class="card">
        <div class="summary-movie">
          <div class="summary-movie-icon" id="panelIcon">🎬</div>
          <div>
            <div class="summary-movie-title" id="panelTitle">—</div>
            <div class="summary-movie-meta" id="panelMeta">—</div>
          </div>
        </div>

        <div class="summary-row">
          <span class="summary-row-label">Theatre</span>
          <span class="summary-row-val" id="panelTheatre">—</span>
        </div>
        <div class="summary-row">
          <span class="summary-row-label">Show time</span>
          <span class="summary-row-val" id="panelTime">—</span>
        </div>
        <div class="summary-row">
          <span class="summary-row-label">Selected seats</span>
          <span class="summary-row-val" id="panelSeats"><span class="no-seat-msg">None selected</span></span>
        </div>
        <div class="summary-row">
          <span class="summary-row-label">Tickets</span>
          <span class="summary-row-val" id="panelCount">0</span>
        </div>

        <div class="summary-total">
          <span class="summary-total-label">Total</span>
          <span class="summary-total-price" id="panelTotal">₹0</span>
        </div>

        <button class="btn btn-red btn-full btn-lg" style="margin-top:20px;" onclick="proceedToPayment()">
          Proceed to Payment →
        </button>
        <a href="movie-details.html" class="btn btn-outline btn-full" style="margin-top:10px;">← Change Showtime</a>
      </div>
    </div>
  </div>

  <footer>
    <p>© 2026 CineBook. All rights reserved.</p>
  </footer>

  <script>
    const user = JSON.parse(localStorage.getItem('cb_user') || 'null');
    if (!user) { window.location.href = 'login.html'; }
    document.getElementById('logoutBtn').addEventListener('click', function(e) {
      e.preventDefault(); localStorage.removeItem('cb_user'); window.location.href = 'login.html';
    });

    const movie = JSON.parse(localStorage.getItem('cb_movie') || 'null');
    const show = JSON.parse(localStorage.getItem('cb_show') || 'null');
    if (!movie || !show) { window.location.href = 'movies.html'; }

    // Populate info
    document.getElementById('screenName').textContent = show.theatre;
    document.getElementById('showInfo').textContent = `📍 ${show.location} · 🕐 ${show.time}`;
    document.getElementById('panelIcon').textContent = movie.icon || '🎬';
    document.getElementById('panelTitle').textContent = movie.title;
    document.getElementById('panelMeta').textContent = `${movie.genre} · ${movie.duration}`;
    document.getElementById('panelTheatre').textContent = show.theatre;
    document.getElementById('panelTime').textContent = show.time;

    // Generate booked seats (deterministic based on movie+show)
    const seed = (movie.id || 1) + (show.time.charCodeAt(0) || 0);
    const bookedSeats = new Set();
    for (let i = 0; i < 18; i++) {
      bookedSeats.add(((seed * (i + 7) * 13) % 60) + 1);
    }

    // Seat config
    const sections = [
      { label: 'Premium', price: movie.price + 50, rows: ['A', 'B'], seatsPerRow: 10, type: 'premium' },
      { label: 'Classic', price: movie.price, rows: ['C', 'D', 'E', 'F'], seatsPerRow: 10, type: 'normal' },
      { label: 'Economy', price: movie.price - 30, rows: ['G', 'H', 'I', 'J'], seatsPerRow: 10, type: 'normal' },
    ];

    let selectedSeats = {};
    let seatNum = 0;

    const seatMap = document.getElementById('seatMap');

    sections.forEach(sec => {
      const secDiv = document.createElement('div');
      secDiv.className = 'seat-section';
      secDiv.innerHTML = `<div class="seat-section-label">${sec.label} <span class="seat-section-price">₹${sec.price}</span></div>`;

      sec.rows.forEach(row => {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'seat-row';
        rowDiv.innerHTML = `<span class="row-label">${row}</span>`;

        for (let i = 0; i < sec.seatsPerRow; i++) {
          seatNum++;
          if (i === 4) {
            const aisle = document.createElement('div');
            aisle.className = 'aisle';
            rowDiv.appendChild(aisle);
          }
          const seatEl = document.createElement('div');
          seatEl.className = `seat${sec.type === 'premium' ? ' premium' : ''}`;
          const seatId = `${row}${i + 1}`;
          seatEl.dataset.id = seatId;
          seatEl.dataset.price = sec.price;
          seatEl.title = seatId;

          if (bookedSeats.has(seatNum)) {
            seatEl.classList.add('booked');
          } else {
            seatEl.addEventListener('click', () => toggleSeat(seatEl, seatId, sec.price, sec.type));
          }
          rowDiv.appendChild(seatEl);
        }
        secDiv.appendChild(rowDiv);
      });
      seatMap.appendChild(secDiv);
    });

    function toggleSeat(el, id, price, type) {
      if (el.classList.contains('selected')) {
        el.classList.remove('selected');
        delete selectedSeats[id];
      } else {
        if (Object.keys(selectedSeats).length >= 10) {
          alert('You can select up to 10 seats per booking.'); return;
        }
        el.classList.add('selected');
        selectedSeats[id] = price;
      }
      updateSummary();
    }

    function updateSummary() {
      const seatIds = Object.keys(selectedSeats);
      const total = Object.values(selectedSeats).reduce((a, b) => a + b, 0);
      document.getElementById('panelSeats').innerHTML = seatIds.length > 0
        ? seatIds.map(s => `<span class="badge badge-grey" style="margin:2px;">${s}</span>`).join('')
        : '<span class="no-seat-msg">None selected</span>';
      document.getElementById('panelCount').textContent = seatIds.length;
      document.getElementById('panelTotal').textContent = `₹${total}`;
    }

    function proceedToPayment() {
      const seatIds = Object.keys(selectedSeats);
      if (seatIds.length === 0) { alert('Please select at least one seat.'); return; }
      const total = Object.values(selectedSeats).reduce((a, b) => a + b, 0);
      const booking = {
        movie: movie.title,
        movieIcon: movie.icon,
        theatre: show.theatre,
        location: show.location,
        time: show.time,
        seats: seatIds,
        total
      };
      localStorage.setItem('cb_booking', JSON.stringify(booking));
      window.location.href = 'payment.html';
    }
  </script>
</body>
</html>
